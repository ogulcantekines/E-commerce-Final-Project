{% extends "base.html" %}
{% block content %}
<div class="container my-5 text-center">
    <div class="card shadow-sm border-0 p-4 mx-auto" style="max-width: 500px; border-radius: 20px;">
        <h3 class="fw-bold mb-4">Şifre Sıfırlama</h3>
        <p class="text-muted">Lütfen e-posta adresinizi giriniz. Size şifre sıfırlama bağlantısı göndereceğiz.</p>
        <form method="post">
            {% csrf_token %}
            <div class="mb-3 text-start">
                {{ form.as_p }}
            </div>
            <button type="submit" class="btn btn-primary w-100 rounded-pill py-3">Şifre Sıfırlama Bağlantısı Gönder</button>
        </form>
    </div>
</div>
{% endblock %}
