{% load static %}
<header class="py-3 border-bottom bg-white">
    <div class="container">
        <div class="header-top d-flex flex-wrap align-items-center gap-3">
            <a href="{% url 'index' %}">
                <img src="{% static 'images/logo.avif' %}" class="img-fluid" width="100" height="100" alt="logo" />
            </a>

            <form action="{% url 'search' %}" method="GET" class="header-search flex-grow-1">
                <div class="input-group">
                    <input type="text" name="q" class="form-control rounded-pill-start border-end-0 ps-4"
                           placeholder="Aramak istediğiniz ürünü yazın" style="border-radius: 50px 0 0 50px" />
                    <button type="submit" class="input-group-text bg-white border-start-0" style="border-radius: 0 50px 50px 0;">
                        <i class="fa-solid fa-magnifying-glass text-secondary pe-3"></i>
                    </button>
                </div>
            </form>

            <div class="header-actions d-flex gap-3 align-items-center">
                <div class="dropdown">
                    <button class="btn btn-light rounded-pill px-4 py-2 shadow-sm dropdown-toggle d-flex align-items-center justify-content-center border-0 w-100" type="button" id="userDropdown" data-bs-toggle="dropdown" aria-expanded="false" style="background-color: #f8f9fa">
                        <i class="fa-regular fa-user me-2 fs-5"></i>
                        <span class="fw-bold text-truncate">
                            {% if user.is_authenticated %}
                                {{ user.first_name|default:user.username }}
                            {% else %}
                                Giriş Yap
                            {% endif %}
                        </span>
                    </button>
                    <ul class="dropdown-menu dropdown-menu-end border-0 shadow mt-3 p-2" style="border-radius: 15px; min-width: 180px; z-index: 9999 !important; position: absolute;">
                        {% if user.is_authenticated %}
                            <li><a class="dropdown-item fw-bold py-2 rounded-3" href="{% url 'profile' %}">Profilim</a></li>
                            <li><a class="dropdown-item fw-bold py-2 rounded-3" href="{% url 'orders' %}">Siparişlerim</a></li>
                            <li><hr class="dropdown-divider"></li>
                            <li><a class="dropdown-item fw-bold py-2 rounded-3 text-danger" href="{% url 'logout' %}">Çıkış Yap</a></li>
                        {% else %}
                            <li><a class="dropdown-item fw-bold py-2 rounded-3" href="{% url 'user_account' %}">Giriş Yap</a></li>
                            <li><a class="dropdown-item fw-bold py-2 rounded-3" href="{% url 'user_account' %}">Üye Ol</a></li>
                        {% endif %}
                    </ul>
                </div>

                <div class="position-relative">
                    <span class="position-absolute top-50 start-0 translate-middle badge rounded-circle bg-white text-dark border shadow-sm" style="width: 28px; height: 28px; line-height: 20px; z-index: 5; margin-left: -5px;">
                        {{ cart_total_quantity|default:0 }}
                    </span>
                    <a href="{% url 'cart' %}" class="btn btn-light rounded-pill px-4 py-2 shadow-sm d-flex align-items-center justify-content-center border-0" style="background-color: #f8f9fa">
                        <i class="fa-solid fa-cart-shopping me-2 fs-5 ms-2"></i>
                        <span class="fw-bold">Sepetim</span>
                    </a>
                </div>
            </div>
        </div>

        <nav class="navbar navbar-expand-lg bg-body-tertiary mt-3 rounded-4 px-3">
            <button class="navbar-toggler ms-auto" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Navigasyonu aç">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav gap-lg-2">
                    {% for cat in categories %}
                    <li class="nav-item">
                        <a class="nav-link fw-bold" href="{% url 'category_list' cat.slug %}">{{ cat.name }}</a>
                    </li>
                    {% endfor %}
                </ul>
            </div>
        </nav>
    </div>
</header>
