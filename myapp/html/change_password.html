{% extends 'base.html' %}
{% block content %}
<div class="container my-5">
    <div class="card shadow-sm border-0 p-4 mx-auto" style="max-width: 500px; border-radius: 20px;">
        <h3 class="fw-bold mb-4 text-center">Şifre Değiştir</h3>
        <form method="POST">
            {% csrf_token %}
            {{ form.as_p }}  <button type="submit" class="btn btn-danger w-100 rounded-pill mt-3">Şifreyi Güncelle</button>
        </form>
    </div>
</div>
{% endblock %}
